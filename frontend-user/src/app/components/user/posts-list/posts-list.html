<div class="min-h-screen bg-gray-100 p-4 md:p-6">

  <!-- Loading State -->
  <div *ngIf="loading" class="flex justify-center items-center py-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    <span class="ml-3 text-gray-600">Loading posts...</span>
  </div>

  <!-- Posts List -->
  <div class="space-y-6" *ngIf="!loading">
   <ng-container *ngFor="let p of posts">
  <article 
    *ngIf="selectedCategoryId === null || p.categoryId === selectedCategoryId"
    class="bg-white rounded-xl shadow-md hover:shadow-lg transition-shadow duration-300 p-6">
      
<div
  class="rounded-lg bg-card text-card-foreground shadow-sm hover:shadow-2xl transition-all border-2 hover:border-primary/50 bg-gradient-to-br from-card via-card to-primary/5">
  <div class="p-6 space-y-4">

    <!-- Header -->
    <div class="flex items-center gap-3">
      <span class="relative flex shrink-0 overflow-hidden rounded-full h-12 w-12 ring-2 ring-primary/20">
        <img class="aspect-square h-full w-full"
          src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ahmed">
      </span>

      <div class="flex-1 min-w-0">
<a 
  [routerLink]="['/user', p.user?.userId]"
  [class.no-click]="p.user?.userId === currentUserId"
  class="font-semibold text-sm text-black-600"
>
  {{ p.user?.fname || 'Unknown' }} {{ p.user?.lname || '' }}
</a>

        <p class="text-xs text-muted-foreground">
          {{ p.createdAt | date:'mediumDate' }} at {{ p.createdAt | date:'shortTime' }}
        </p>
      </div>

      <div
        class="inline-flex items-center border px-2.5 py-0.5 text-xs font-semibold transition-colors
        focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 border-transparent
        bg-secondary text-secondary-foreground hover:bg-secondary/80 shrink-0 rounded-full">
        {{ p.skillName }}
      </div>
    </div>

    <!-- Content -->
    <p class="text-sm leading-relaxed" style="width: 50%;">
      {{ p.content }}
    </p>

    <div data-orientation="horizontal" role="none" class="shrink-0 bg-border h-[1px] w-full"></div>

    <!-- Buttons -->
    <div class="flex items-center gap-4">

      <!-- Like button -->
      <button  (click)="toggleLike(p)"
      [ngClass]="p.likedByUser
          ? 'bg-blue-600 text-white hover:bg-blue-700'
          : 'border border-input bg-background hover:bg-accent hover:text-accent-foreground'"
        class="inline-flex items-center justify-center gap-2 whitespace-nowrap text-sm font-medium
        ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2
        focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50
        [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0 border border-input bg-background
        hover:bg-accent hover:text-accent-foreground h-9 px-3 rounded-full">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-thumbs-up h-4 w-4 mr-2">
          <path d="M7 10v12"></path>
          <path
            d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z">
          </path>
        </svg>
        {{ p.totalLiked ?? 0 }}
      </button>

      <!-- Comments -->
      <div class="flex items-center gap-2 text-sm text-muted-foreground"
        [routerLink]="['/posts', p.postId]">

        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-message-square h-4 w-4">
          <path
            d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z">
          </path>
        </svg>

        {{ p.totalComments ?? 0 }}
      </div>
    </div>
  </div>
</div>

    </article>
    </ng-container>
  </div>

  <!-- Pagination -->
  <div class="flex justify-center items-center mt-8 gap-4" *ngIf="!loading && posts.length > 0">
    <button (click)="page = page - 1; loadPosts()" [disabled]="page <= 1"
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed transition">
      ← Previous
    </button>
    <span class="text-gray-600 font-medium">Page {{ page }}</span>
    <button (click)="page = page + 1; loadPosts()" [disabled]="posts.length < pageSize"
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed transition">
      Next →
    </button>
  </div>

  <!-- No Posts Message -->
  <div *ngIf="!loading && posts.length === 0" class="text-center py-12 text-gray-500">
    <p class="text-lg">No posts found. Try searching or create a new post!</p>
  </div>
</div>
