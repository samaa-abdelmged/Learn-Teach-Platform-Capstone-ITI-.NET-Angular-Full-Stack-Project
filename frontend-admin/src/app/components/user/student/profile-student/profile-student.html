<div class="flex w-full min-h-screen bg-gray-50 dark:bg-gray-900 relative">

    <div [ngClass]="{
      'fixed inset-0 z-50 transform transition-transform duration-300': isMobile(),
      '-translate-x-full': isMobile() && !isSidebarOpen,
      'translate-x-0': isSidebarOpen,
      'w-7': !isSidebarOpen && !isMobile(),
      'w-60': isSidebarOpen || isMobile()
    }" class="bg-white dark:bg-gray-800 shadow-lg h-screen lg:static lg:translate-x-0 transition-all duration-300">


        <app-sidebar *ngIf="currentRole === 'student'" [collapsed]="!isSidebarOpen"></app-sidebar>
        <app-sidebar *ngIf="currentRole === 'teacher'" [collapsed]="!isSidebarOpen"></app-sidebar>


    </div>

    <div *ngIf="isSidebarOpen && isMobile()" class="fixed inset-0 bg-black/40 z-40" (click)="toggleSidebar()"></div>

    <main [ngClass]="{
        'ml-0 w-full': isMobile(),
        'ml-9 w-[calc(100%-2rem)]': !isSidebarOpen && !isMobile(),
        'ml-5 w-[calc(100%-14rem)]': isSidebarOpen && !isMobile()
      }" class="flex flex-col transition-all duration-300 overflow-auto p-6">


        <app-user-header [isDarkMode]="isDarkMode" (toggleSidebarEvent)="toggleSidebar()"
            (toggleDarkModeEvent)="toggleDarkMode()" (roleChanged)="onRoleChange($event)">
        </app-user-header>



        <div class="flex flex-col gap-6 mt-3">

            <div
                class="bg-gradient-to-r from-blue-100/30 to-purple-100/30 backdrop-blur-xl shadow-lg rounded-2xl p-6 flex flex-col md:flex-row gap-6 border border-white/20">

                <img src="https://i.pravatar.cc/150?img=3"
                    class="rounded-full shadow-md ring-4 ring-white/30 w-24 h-24 md:w-32 md:h-32" />

                <div class="flex-1">
                    <h2 class="text-3xl font-bold text-gray-800 dark:text-white">{{profile.fname}} {{profile.lname}}
                    </h2>
                    <p class="text-gray-600 dark:text-gray-300 mt-1">{{profile.authuserid}}</p>

                    <p class="mt-3 text-gray-700 dark:text-gray-300">{{profile.experienceText}}</p>

                    <div class="mt-4 flex gap-3 flex-wrap">
                        <span
                            class="px-3 py-1 bg-green-500/20 text-green-600 rounded-xl text-sm font-medium">Verified</span>
                        <span
                            class="px-3 py-1 bg-yellow-500/20 text-yellow-600 rounded-xl text-sm font-medium">Premium</span>
                        <span class="px-3 py-1 bg-blue-500/20 text-blue-600 rounded-xl text-sm font-medium">150
                            Points</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">

                <div
                    class="bg-white dark:bg-gray-800 shadow-lg rounded-xl p-5 border border-gray-200 dark:border-gray-700 hover:scale-[1.02] transition">
                    <h3 class="text-xl font-semibold mb-3 text-blue-600">Teaching Skills</h3>
                    <ul class="space-y-2">
                        <li class="p-2 bg-blue-50 dark:bg-gray-700 rounded-lg" *ngFor="let skill of teachingSkills">
                            {{skill.name}}</li>
                    </ul>
                </div>

                <div
                    class="bg-white dark:bg-gray-800 shadow-lg rounded-xl p-5 border border-gray-200 dark:border-gray-700 hover:scale-[1.02] transition">
                    <h3 class="text-xl font-semibold mb-3 text-purple-600">Learning Skills</h3>
                    <ul class="space-y-2">
                        <li class="p-2 bg-purple-50 dark:bg-gray-700 rounded-lg" *ngFor="let skill of learningSkills">
                            {{skill.name}}</li>
                    </ul>
                </div>

            </div>

            <div
                class="mt-4 bg-white dark:bg-gray-800 p-6 shadow-lg rounded-xl border border-gray-200 dark:border-gray-700">
                <h3 class="text-xl font-bold mb-4 text-pink-600">User Feedback</h3>
                <div class="space-y-4">
                    <div class="p-3 bg-gray-50 dark:bg-gray-700 rounded-lg border dark:border-gray-600"
                        *ngFor="let fb of feedback">
                        <p><strong>User</strong> — {{'⭐'.repeat(fb.rating)}}</p>
                        <p>{{fb.comment}}</p>
                    </div>
                </div>
            </div>

        </div>


    </main>
</div>
